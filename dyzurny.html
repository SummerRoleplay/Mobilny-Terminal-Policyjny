<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Dyżurny — MTP</title>
    <link rel="icon" href="./KWP.png">
    <link rel="stylesheet" href="./style.css">
    <style>
        /* Kilka szybkich poprawek wizualnych */
        .pill { cursor: pointer; display: inline-block; margin-bottom: 4px; }
        .pill:hover { opacity: 0.8; }
        .patrol-status { border-bottom: 1px solid #eee; padding: 15px 0; }
        .muted { display: block; font-size: 0.85em; color: #666; }
        .badge { background: #34495e; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>

<body data-board="true">

<div class="container">

  <div class="header">
    <div class="brand">
      <img src="./KWP.png" alt="Logo KWP">
      <div>
        <h1>System Dyżurnego — KWP GDAŃSK</h1>
        <p>Summer RP · MTP</p>
      </div>
    </div>

    <div class="topbar">
      <div id="sessionBadge" class="badge">Sesja: Brak</div>
      <button onclick="location.href='./index.html'" class="btn btn-ghost">⬅ Powrót</button>
    </div>
  </div>

  <div id="notify" class="card" style="display:none; position: fixed; top: 20px; right: 20px; z-index: 1000; width: 300px;">
    <div class="card-inner">
      <div id="notifyText" class="status"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-inner">
      <div class="card-title">
        <h2>Nowy patrol</h2>
        <small>Start służby</small>
      </div>
      <div class="hr"></div>
      <div class="patrol-grid">
        <div>
          <label>Nr boczny</label>
          <input id="patrolId" placeholder="np. 101">
        </div>
        <div>
          <label>Pojazd</label>
          <input id="pojazd" placeholder="np. Kia Ceed">
        </div>
        <div class="full">
          <button class="btn btn-primary" onclick="addPatrol()">Uruchom służbę</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-inner">
      <div class="card-title">
        <h2>Skład patrolu</h2>
      </div>
      <div class="hr"></div>
      <div class="patrol-grid">
        <div>
          <label>Funkcjonariusz</label>
          <select id="officerSelect"></select>
        </div>
        <div>
          <label>Patrol</label>
          <select id="assignedPatrol"></select>
        </div>
        <div class="full">
          <button class="btn" onclick="assignOfficer()">Dodaj do składu</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-inner">
      <div class="card-title">
        <h2>Status patroli</h2>
      </div>
      <div class="hr"></div>
      <div id="patrolList"></div>
    </div>
  </div>

</div>

<script src="./app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // 🔐 SESSION CHECK
  const session = JSON.parse(localStorage.getItem("mtp_session_v2") || "null");
  if (!session || !session.isBoard) {
    alert("Brak dostępu. Zaloguj się.");
    location.href = "./index.html";
    return;
  }
  
  // Wyświetl kto zarządza
  const badge = document.getElementById("sessionBadge");
  if(badge && session.user) badge.textContent = `Dyżurny: ${session.user}`;

  // 👮 OFFICERS SAFE LOAD
  const officersData = window.OFFICERS ?? [];

  // 📦 STATE
  let patrols = JSON.parse(localStorage.getItem("patrols_v5") || "[]");

  // 🎨 STATUS CONFIG
  const STATUS_CONFIG = {
    "Dostępny": { color: "#2ecc71" },
    "Niedostępny": { color: "#ff4d4d" },
    "Zadysponowany": { color: "#4aa3ff" },
    "Podjęcie interwencji": { color: "#ffcc66" },
    "Interwencja własna": { color: "#f39c12" },
    "Przerwa": { color: "#95a5a6" },
    "Transport": { color: "#9b59b6" },
    "Konwój": { color: "#8e44ad" },
    "Zabezpieczenie": { color: "#1abc9c" },
    "Brak łączności": { color: "#e74c3c" }
  };

  // 🔔 NOTIFY
  function notify(msg, type = "ok") {
    const box = document.getElementById("notify");
    const text = document.getElementById("notifyText");
    if (!box || !text) return;

    box.style.display = "block";
    text.textContent = msg;

    text.className = "status";
    if (type === "ok") text.style.borderLeft = "5px solid #2ecc71";
    if (type === "err") text.style.borderLeft = "5px solid #e74c3c";

    setTimeout(() => box.style.display = "none", 2500);
  }

  // ⏱ FORMAT
  function formatTime(ms) {
    if (ms < 0) ms = 0;
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    return [h, m, sec].map(v => v < 10 ? "0" + v : v).join(":");
  }

  // 💾 SAVE
  function save() {
    localStorage.setItem("patrols_v5", JSON.stringify(patrols));
  }

  // 👮 LOAD OFFICERS
  function loadOfficers() {
    const sel = document.getElementById("officerSelect");
    if (!sel) return;

    sel.innerHTML = officersData.length
      ? officersData.map(o =>
          `<option value="${o.id}">${o.id} — ${o.rank ?? "brak rangi"} — ${o.name}</option>`
        ).join("")
      : `<option disabled>Brak danych w app.js</option>`;
  }

  // ➕ ADD PATROL
  window.addPatrol = function () {
    const idInput = document.getElementById("patrolId");
    const pojInput = document.getElementById("pojazd");
    const id = idInput?.value?.trim();
    const pojazd = pojInput?.value?.trim();

    if (!id || !pojazd) return notify("Uzupełnij dane patrolu", "err");

    const now = Date.now();
    patrols.push({
      id: "GD-" + id,
      pojazd,
      status: "Dostępny",
      officers: [],
      start: now,
      statusStart: now
    });

    idInput.value = "";
    pojInput.value = "";
    save();
    render();
    notify("Patrol uruchomiony");
  };

  // 👮 ASSIGN OFFICER
  window.assignOfficer = function () {
    const officerId = document.getElementById("officerSelect")?.value;
    const patrolId = document.getElementById("assignedPatrol")?.value;

    if (!officerId || !patrolId) return notify("Wybierz funkcjonariusza i patrol", "err");

    const p = patrols.find(x => x.id === patrolId);
    if (!p) return;

    if (p.officers.includes(officerId)) {
        return notify("Ten funkcjonariusz jest już w tym patrolu", "err");
    }

    p.officers.push(officerId);
    save();
    render();
    notify("Dodano funkcjonariusza");
  };

  // ❌ REMOVE OFFICER
  window.removeOfficer = function (i, id) {
    if (!patrols[i]) return;
    patrols[i].officers = patrols[i].officers.filter(x => x !== id);
    save();
    render();
    notify("Usunięto z patrolu");
  };

  // 🔄 STATUS CHANGE
  window.changeStatus = function (i, val) {
    if (!patrols[i]) return;
    patrols[i].status = val;
    patrols[i].statusStart = Date.now();
    save();
    render();
    notify("Zmieniono status: " + val);
  };

  // ❌ DELETE PATROL
  window.deletePatrol = function (i) {
    if(!confirm("Czy na pewno zakończyć ten patrol?")) return;
    patrols.splice(i, 1);
    save();
    render();
    notify("Patrol zakończony", "err");
  };

  // 🎨 RENDER
  function render() {
    const list = document.getElementById("patrolList");
    const assigned = document.getElementById("assignedPatrol");

    if (!list || !assigned) return;

    list.innerHTML = "";

    patrols.forEach((p, i) => {
      const div = document.createElement("div");
      div.className = "patrol-status";

      const color = STATUS_CONFIG[p.status]?.color || "#ccc";

      div.innerHTML = `
        <div class="patrol-left">
          <div class="patrol-meta">
            <strong>${p.id}</strong>
            <span class="muted">Pojazd: ${p.pojazd}</span>
            <span class="muted">Czas służby: <b class="time" data-time="${p.start}">00:00:00</b></span>
            <span class="muted">Czas statusu: <b class="time2" data-time="${p.statusStart}">00:00:00</b></span>
          </div>
          <span class="pill" style="background:${color}; color: white; padding: 2px 8px; border-radius: 4px;">
            ${p.status}
          </span>
        </div>
        <div class="patrol-actions" style="margin-top: 10px;">
          <select onchange="changeStatus(${i}, this.value)" style="padding: 5px;">
            ${Object.keys(STATUS_CONFIG).map(s =>
              `<option value="${s}" ${p.status === s ? "selected" : ""}>${s}</option>`
            ).join("")}
          </select>
          <button class="btn btn-error" onclick="deletePatrol(${i})" style="background: #e74c3c; color:white; border:none; padding: 5px 10px; cursor:pointer;">Zakończ</button>
        </div>
        <div class="crew-list" style="margin-top: 10px;"></div>
      `;

      const crewDiv = div.querySelector(".crew-list");
      p.officers.forEach((offId) => {
        const offData = officersData.find(x => x.id === offId);
        const nameDisplay = offData ? `${offData.rank} ${offData.name}` : offId;
        
        const tag = document.createElement("span");
        tag.className = "pill";
        tag.style.cssText = "background: #eee; color: #333; padding: 2px 8px; border-radius: 10px; margin-right: 5px; border: 1px solid #ccc; font-size: 0.8em;";
        tag.innerHTML = `${nameDisplay} <strong style="color:red; margin-left:5px;">×</strong>`;
        tag.onclick = () => removeOfficer(i, offId);
        crewDiv.appendChild(tag);
      });

      list.appendChild(div);
    });

    // Update selectu patroli w formularzu składu
    assigned.innerHTML = patrols.length 
      ? patrols.map(p => `<option value="${p.id}">${p.id}</option>`).join("")
      : `<option disabled>Brak aktywnych patroli</option>`;
  }

  // ⏱ LIVE TIMER
  setInterval(() => {
    const now = Date.now();
    document.querySelectorAll(".time").forEach(el => {
      const startTime = parseInt(el.getAttribute("data-time"));
      el.textContent = formatTime(now - startTime);
    });
    document.querySelectorAll(".time2").forEach(el => {
      const startTime = parseInt(el.getAttribute("data-time"));
      el.textContent = formatTime(now - startTime);
    });
  }, 1000);

  // INIT
  loadOfficers();
  render();

});
</script>
</body>
</html>
